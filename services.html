<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available workers | HandyHood</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Inter', sans-serif;
        }
    h1, h2, h3, h4 {
        font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="images/logo3.png" />
            <span class="handy">Handy<span class="hood">Hood</span></span>
          </div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        
        
        </nav>
        <!--action buttons-->
        <div class="active-btn">

            <button id="joinWorkerBtn" class="worker-btn">Join as Worker</button>

            <div id="workerModal" class="modal">
                <div class="modal-content">
                  <span id="closeModal" class="close">&times;</span>
              
                  <h2>Join as Worker</h2>
                  <form id="workerForm">
                    <input id="fullName" type="text" placeholder="Full Name" required>
                  
                    <input id="mobile" type="tel" placeholder="Mobile Number" required>
                  
                    <input id="password" type="password" placeholder="Password" required>
                  
                    <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
                  
                    <select id="category" required>
                      <option value="">Select Work Category</option>
                      <option>Electrician</option>
                      <option>Plumber</option>
                      <option>Carpenter</option>
                      <option>Painter</option>
                      <option>Cleaner</option>
                    </select>
                  
                    <input id="city" type="text" placeholder="City / Area" required>
                  
                    <button type="submit">Join as Worker</button>
                  </form>
                  
                </div>
              </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
    </header>

    <h2>Find Workers Here!</h2>
    <div class="filters">
        <select>
            <option>Select District</option>
            <option>Adilabad</option>
            <option>Nirmal</option>
            <option>Karimnagar</option>
            <option>Peddapally</option>
            <option>jayashankar-bhupalpely</option>
            <option>warangal-rural</option>
            <option>warangal-urban</option>
            <option>hyderabad</option>
            <option>secendrabad</option>
            <option>nalgonda</option>
            <option>Khammam</option>
            <option>mahubhubnagar</option>
            <option>RangaReddy</option>
            <option>Sangareddy</option>
            
        </select>
        <select>
            <option>Select Mandal</option>
            <option>nekkonda</option>
            <option>narsampet</option>
            

        </select>
        <select>
            <option>Service</option>
        </select>

        <select>
            <option>Sort By</option>
            <option>Price</option>
            <option>Experience</option>
        </select>
        <button>Find Services</button>
    </div>
</section>


<section class="worker-list">
    <div class="worker-card">
        <h3>Ramesh</h3>
        <p>Plumber</p>
        <p>₹300 / hour</p>
        <p>Available: 9 AM – 5 PM</p>
        <button>Call Now</button>
    </div>
</section>


<footer>
    <p>© HandyHood</p>
</footer>



</body>
</html>
