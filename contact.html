<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | HandyHood</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Inter', sans-serif;
        }
    h1, h2, h3, h4 {
        font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="images/logo3.png" />
            <span class="handy">Handy<span class="hood">Hood</span></span>
          </div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        
        
        </nav>
        <!--action buttons-->
        <div class="active-btn">

            <button id="joinWorkerBtn" class="worker-btn">Join as Worker</button>

            <div id="workerModal" class="modal">
                <div class="modal-content">
                  <span id="closeModal" class="close">&times;</span>
              
                  <h2>Join as Worker</h2>
                  <form id="workerForm">
                    <input id="fullName" type="text" placeholder="Full Name" required>
                  
                    <input id="mobile" type="tel" placeholder="Mobile Number" required>
                  
                    <input id="password" type="password" placeholder="Password" required>
                  
                    <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
                  
                    <select id="category" required>
                      <option value="">Select Work Category</option>
                      <option>Electrician</option>
                      <option>Plumber</option>
                      <option>Carpenter</option>
                      <option>Painter</option>
                      <option>Cleaner</option>
                    </select>
                  
                    <input id="city" type="text" placeholder="City / Area" required>
                  
                    <button type="submit">Join as Worker</button>
                  </form>
                  
                </div>
              </div>
            <a href="#" class="book-btn">Book Now</a>
        </div>
    </header>
    <!-- Header -->
    
    <header>
        <h1>Contact HandyHood</h1>
        <p>We’re here to help you with local services</p>
    </header>

    <!-- Contact Section -->
    <section>
        <h2>Get in Touch</h2>

        <form>
            <!-- Name -->
            <label for="name">Full Name</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

            <!-- Email -->
            <label for="email">Email Address</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <!-- Phone -->
            <label for="phone">Phone Number</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>

            <!-- Service Type -->
            <label for="service">Service Needed</label><br>
            <select id="service" name="service" required>
                <option value="">-- Select Service --</option>
                <option>Plumber</option>
                <option>Electrician</option>
                <option>Carpenter</option>
                <option>Painter</option>
                <option>Cleaning</option>
                <option>Other</option>
            </select><br><br>

            <!-- Message -->
            <label for="message">Message</label><br>
            <textarea id="message" name="message" rows="4" placeholder="Describe your problem"></textarea><br><br>

            <!-- Submit -->
            <button type="submit">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 HandyHood | Local Services Made Easy</p>
    </footer>

</body>
</html>
