<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | HandyHood</title>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">HandyHood</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <button>Join As Worker</button>
    </header>
    <header>
        <h1>Contact HandyHood</h1>
        <p>We’re here to help you with local services</p>
    </header>

    <!-- Contact Section -->
    <section>
        <h2>Get in Touch</h2>

        <form>
            <!-- Name -->
            <label for="name">Full Name</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

            <!-- Email -->
            <label for="email">Email Address</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <!-- Phone -->
            <label for="phone">Phone Number</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>

            <!-- Service Type -->
            <label for="service">Service Needed</label><br>
            <select id="service" name="service" required>
                <option value="">-- Select Service --</option>
                <option>Plumber</option>
                <option>Electrician</option>
                <option>Carpenter</option>
                <option>Painter</option>
                <option>Cleaning</option>
                <option>Other</option>
            </select><br><br>

            <!-- Message -->
            <label for="message">Message</label><br>
            <textarea id="message" name="message" rows="4" placeholder="Describe your problem"></textarea><br><br>

            <!-- Submit -->
            <button type="submit">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 HandyHood | Local Services Made Easy</p>
    </footer>

</body>
</html>
